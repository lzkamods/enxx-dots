"$schema" = 'https://starship.rs/config-schema.json'
palette = "wal"

format = """
[ ŅéČ](fg:color1)\
$os\
$username\
[Ņé░](bg:color2 fg:color1)\
$directory\
[Ņé░](bg:color3 fg:color2)\
$git_branch\
$git_status\
[](bg:color1 fg:color2)\
$time\
[Ņé┤](fg:color3)\
$fill\
[ŅéČ](fg:color4)\
$status\
[Ņé▓](bg:color4 fg:color5)\
$cmd_duration\
[Ņé┤ ](fg:color5)\
$line_break\
$line_break\
$character\
"""

[username]
show_always = true
style_user = ""
style_root = ""
format = '[ ¾░Żć $user ]($style bg:color1 fg:foreground)'
disabled = false

[os]
style = ""
disabled = true

[directory]
style = ""
format = "[ $path ]($style bg:color2 fg:foreground)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "’Ćü "
"Pictures" = "’ĆŠ "

[git_branch]
symbol = "’Éś"
style = ""
format = '[ $symbol $branch ]($style bg:color7 fg:foreground)'

[git_status]
style = ""
format = '[$all_status$ahead_behind ]($style bg:color6 fg:foreground)'

[time]
disabled = false
time_format = "%R:%S"
style = ""
format = '[ $time ]($style bg:color3 fg:foreground)'

[fill]
symbol = " "

[status]
disabled = false
format = "[ $symbol$signal_name$status ]($style bg:color4)"
style = "bold bg:color4 fg:foreground"
failure_style = "bold bg:background fg:foreground"
map_symbol = true
symbol = "ŌØī"
success_symbol = "’Ćī "
sigint_symbol = "ŌÜĪ"
signal_symbol = "ŌÜĪ"

[cmd_duration]
format = "[ $duration ]($style bg:color5)"
style = "bold bg:color5 fg:foreground"
min_time = 0
show_milliseconds = true

[character]
disabled = false
success_symbol = "[ ’äĄ ’ģĖ](bold fg:foreground)"
error_symbol = "[ ’ĆŹ ](bold fg:foreground)"
vimcmd_symbol = "[ ’üó ](bold fg:foreground)"
